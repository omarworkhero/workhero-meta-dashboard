name: Refresh Meta Dashboard

on:
  schedule:
    - cron: "0 8 * * *"   # primary: 8AM UTC (4AM ET)
    - cron: "0 20 * * *"  # backup:  8PM UTC (4PM ET)
  push:
    branches: [main]
    paths-ignore:
      - "index.html"      # skip if GHA itself pushed (avoids loop)
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-meta
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Write config
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          HS_CLIENT_ID: ${{ secrets.HS_CLIENT_ID }}
          HS_CLIENT_SECRET: ${{ secrets.HS_CLIENT_SECRET }}
          HS_REFRESH_TOKEN: ${{ secrets.HS_REFRESH_TOKEN }}
        run: python3 write_config.py

      - name: Generate dashboard
        env:
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python3 generate_dashboard.py

      - name: Publish and commit
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 publish.py
