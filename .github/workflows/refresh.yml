name: Refresh Meta Dashboard

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-meta
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Write config from secrets
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          HS_CLIENT_ID: ${{ secrets.HS_CLIENT_ID }}
          HS_CLIENT_SECRET: ${{ secrets.HS_CLIENT_SECRET }}
          HS_REFRESH_TOKEN: ${{ secrets.HS_REFRESH_TOKEN }}
        run: python3 write_config.py

      - name: Generate dashboard
        env:
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python3 generate_dashboard.py

      - name: Check Meta data present
        id: check
        run: |
          if grep -q 'const HAS_META = true' dashboard.html; then
            echo "has_meta=true" >> $GITHUB_OUTPUT
            echo "Meta data present — publishing"
          else
            echo "has_meta=false" >> $GITHUB_OUTPUT
            echo "Meta token invalid — keeping previous dashboard live, skipping publish"
          fi
          DAYS=$(cat token_days_left.txt 2>/dev/null || echo "unknown")
          echo "token_days=${DAYS}" >> $GITHUB_OUTPUT
          STALE=$(python3 -c "
import re, sys
html = open('dashboard.html').read()
m = re.search(r'const AD_DATA_STALE\s*=\s*(true|false)', html)
print(m.group(1) if m else 'unknown')
")
          echo "ad_stale=${STALE}" >> $GITHUB_OUTPUT

      - name: Publish as index.html
        if: steps.check.outputs.has_meta == 'true'
        run: mv dashboard.html index.html

      - name: Commit and push
        if: steps.check.outputs.has_meta == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: refresh dashboard $(date -u +%Y-%m-%d)"
          git push

      - name: Token health check
        run: |
          HAS="${{ steps.check.outputs.has_meta }}"
          DAYS="${{ steps.check.outputs.token_days }}"

          if [ "$HAS" = "false" ]; then
            echo "::error title=Meta Token Expired::Dashboard is stale. Fix: go to developers.facebook.com/tools/explorer, copy the token shown in the Access Token box, and drop it in Claude Code chat — it rotates automatically in 30 seconds."
            exit 1
          fi

          if echo "$DAYS" | grep -qE '^[0-9]+$' && [ "$DAYS" -le 14 ]; then
            echo "::error title=Meta Token Expiring in ${DAYS} Days::Rotate now before the dashboard breaks. Go to developers.facebook.com/tools/explorer, copy the token, drop it in Claude Code chat."
            exit 1
          fi

          echo "Token healthy: ${DAYS} days remaining."

          STALE="${{ steps.check.outputs.ad_stale }}"
          if [ "$STALE" = "true" ]; then
            echo "::error title=Creative Data Stale::Ad-level data is more than 7 days old — likely a Meta API pagination issue. Fix: re-run this workflow. If it persists, check the meta_get chunking logic in generate_dashboard.py."
            exit 1
          fi
